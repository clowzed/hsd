name: Build and Release

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Rename updater artifacts with arch suffix
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos
          for f in *.app.tar.gz; do
            base="${f%.app.tar.gz}"
            mv "$f" "${base}_${{ matrix.arch }}.app.tar.gz"
            mv "${f}.sig" "${base}_${{ matrix.arch }}.app.tar.gz.sig"
          done
          ls -la

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload updater artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-updater-${{ matrix.arch }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz.sig

  publish-release:
    if: github.ref == 'refs/heads/main'
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version and check tag
        id: version
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        if: steps.version.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        if: steps.version.outputs.exists == 'false'
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -la release-assets/

      - name: Generate latest.json
        if: steps.version.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          ARM64_SIG=$(cat release-assets/*_aarch64.app.tar.gz.sig)
          X64_SIG=$(cat release-assets/*_x86_64.app.tar.gz.sig)

          ARM64_TAR=$(basename release-assets/*_aarch64.app.tar.gz)
          X64_TAR=$(basename release-assets/*_x86_64.app.tar.gz)

          cat > release-assets/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Update to ${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${ARM64_SIG}",
                "url": "https://github.com/clowzed/hsd/releases/download/${TAG}/${ARM64_TAR}"
              },
              "darwin-x86_64": {
                "signature": "${X64_SIG}",
                "url": "https://github.com/clowzed/hsd/releases/download/${TAG}/${X64_TAR}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat release-assets/latest.json

      - name: Create tag and release
        if: steps.version.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" release-assets/* \
            --title "$TAG" \
            --notes "Automated release $TAG"
